<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моё первое мини-приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f4f8;
            padding: 40px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 18px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎉 Ура, всё работает!</h1>
    <p>Это твой первый сайт для MAX.</p>
    <button class="btn" onclick="sendData()">Нажми меня</button>

    <script>
        // Проверка, что приложение запущено внутри Telegram/MAX
        if (!window.Telegram || !Telegram.WebApp) {
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:50px;">
                    <h2>⚠️ Ошибка</h2>
                    <p>Это приложение работает только внутри Telegram/MAX!</p>
                </div>`;
        } else {
            // Покажем приветствие
            const user = Telegram.WebApp.initDataUnsafe.user;
            console.log('Пользователь:', user);
        }

        function sendData() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.sendData('{"message": "Кнопка нажата!"}');
                alert('Данные отправлены в бота!');
            }
        }
    </script>
</body>
</html>
